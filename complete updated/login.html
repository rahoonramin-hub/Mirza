<!DOCTYPE html>
<html dir="rtl">
<head>
    <!--MetaDAta-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" charset="UTF-8">
    <link rel="manifest" href="manifest.json">
    
    <!--آیکون ها-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
 
    <!--استایل‌ها (لودینگ از icon.css میاد)-->
    <link rel="stylesheet" href="styles/icon.css">
    <link rel="stylesheet" href="styles/login.css">

    <title>ورود به حساب</title>

    <style>
        /* استایل اسپلش لودینگ */
        .splash-loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #0f1720;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }
    </style>
</head>
<body>
    <!-- اسپلش لودینگ تا زمان تصمیم‌گیری -->
    <div id="splash" class="splash-loader">
        <div class="loader"></div>
    </div>

    <!-- فرم لاگین (مخفی تا زمان نیاز) -->
    <div class="login-container" style="display:none;">
        <i class="fa-solid fa-user-check" ></i>
        <h2>ورود به برنامه حسابداری</h2>
        <input type="email" id="email" placeholder="ایمیل" class="input">
        <input type="password" id="password" placeholder="رمز عبور" class="input">
        <button id="loginBtn" class="btn">ورود</button>
        <p id="errorMsg" class="error"></p>
    </div>

    <!--کتابخانه فایر بیس-->
    <script type="module" src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js"></script>
    
    <!--اسکریپت اصلی-->
    <script type="module" src="script/common.js"></script>
    <script type="module">
        import { login, onAuth } from './script/common.js';
        document.getElementById('loginBtn').onclick = async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            try {
                await login(email, password);
                window.location.href = 'home-complete.html';
            } catch (err) {
                document.getElementById('errorMsg').innerText = 'ایمیل یا رمز اشتباه است';
            }
        };
        onAuth((loggedIn) => {
            if (loggedIn) {
                // کاربر احراز هویت شده → هدایت به خانه
                window.location.href = 'home-complete.html';
            } else {
                // کاربر مهمان → اسپلش را مخفی و فرم را نمایش بده
                document.getElementById('splash').style.display = 'none';
                document.querySelector('.login-container').style.display = '';
            }
        });
    </script>
    <script>
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');

        emailInput?.addEventListener('keydown', (event) => {
            if (event.key !== 'Enter') return;
            event.preventDefault();
            passwordInput?.focus();
        });

        passwordInput?.addEventListener('keydown', (event) => {
            if (event.key !== 'Enter') return;
            event.preventDefault();
            loginBtn?.click();
        });

        emailInput?.focus();
    </script>
    <script>
      if ('serviceWorker' in navigator) {
          navigator.serviceWorker.register('script/sw.js');
      }
    </script>
</body>
</html>
